model_config_name: lgbm_entry_v0
model_role: entry
library: lightgbm
estimator: LGBMRegressor

# Conservative defaults. Tune only on valid folds.
params:
  objective: regression
  n_estimators: 1000
  learning_rate: 0.03
  num_leaves: 31
  min_child_samples: 100
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.0
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1

training_rules:
  - "Fit on train only."
  - "Use valid folds for early stopping / selection only when implemented explicitly."
  - "Do not read test."
