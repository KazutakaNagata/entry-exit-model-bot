model_config_name: lgbm_exit_v0
model_role: exit
library: lightgbm
estimator: LGBMRegressor

params:
  objective: regression
  n_estimators: 1000
  learning_rate: 0.03
  num_leaves: 31
  min_child_samples: 100
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.0
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1

training_rules:
  - "Exit training datasets must be built from OOF entry candidates."
  - "Do not use in-sample entry predictions as features."
  - "Do not read test."
