# Copy this file to btcjpy_1m_split_v1.yaml and fill concrete dates.
# Do not tune using test. Test is locked-audit only.

split_version: btcjpy_1m_split_v1
symbol: BTCJPY
bar_size: 1m
timezone: UTC

# Fill these with actual timestamps after inspecting available data.
train:
  start: "2024-03-13 00:00:00+00:00"
  end:   "2025-09-12 23:00:00+00:00"

valid:
  start: "2024-09-13 00:00:00+00:00"
  end:   "2025-09-26 00:00:00+00:00"
  folds:
    - name: fold_01
      start: "2024-09-13 00:00:00+00:00"
      end:   "2024-12-13 00:00:00+00:00"
    - name: fold_02
      start: "2024-12-13 00:00:00+00:00"
      end:   "2025-03-13 00:00:00+00:00"
    - name: fold_03
      start: "2025-03-13 00:00:00+00:00"
      end:   "2025-06-13 00:00:00+00:00"
    - name: fold_04
      start: "2025-06-13 00:00:00+00:00"
      end:   "2025-09-13 00:00:00+00:00"
    - name: fold_05
      start: "2025-09-13 00:00:00+00:00"
      end:   "2025-09-26 00:00:00+00:00"

test:
  start: "2025-09-26 00:00:00+00:00"
  end:   "2026-05-25 00:00:00+00:00"
  usage: locked_audit_only

purge:
  # Must be >= max entry horizon at minimum.
  purge_minutes: 240
  embargo_minutes: 0

notes:
  - "Change this file only before experiments begin. After runs exist, create v2 instead."
  - "Training and validation scripts must not read the test range."
