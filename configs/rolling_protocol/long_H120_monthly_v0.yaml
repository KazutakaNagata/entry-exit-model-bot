name: long_H120_monthly_v0
side: long
horizon_minutes: 120
fixed_hold_minutes: 120
roundtrip_cost_bps: 15.0
cooldown_after_exit_minutes: 15
same_side_reentry_block_minutes: 30

paths:
  ohlcv: data/processed/binance_japan/BTCJPY/1m/ohlcv.parquet
  labels: outputs/valid/labels/btcjpy_1m_labels.parquet
  model_config: configs/models/lgbm_entry_v0.yaml

training:
  train_months: 9
  valid_months: 3
  test_months: 1
  step_months: 1
  label_lag_minutes: 180
  score_history_days: 120
  max_train_rows: null
  force_col_wise: true
  downcast_float32: true
  save_models: false

entry_selection:
  mode: rolling_quantile
  score_window_days: 60
  score_quantile: 0.995
  score_floor_bps: 40.0
  rolling_score_min_periods: 30000

selector:
  robust_worst_weight: 0.5
  min_valid_episode_count: 10
  min_delta_to_switch_bps: 0.0

# Keep this list small. Humans define domain-hypothesis policies;
# the rolling protocol chooses among them mechanically each cycle.
feature_policies:
  - name: long_H120_v0
    features: data/processed/binance_japan/BTCJPY/1m/feature_selected/long_H120/features_long_H120_v0.parquet
    description: "v3a minus compressed_activity; broader long_H120 candidate"
  - name: long_H120_tail_v0
    features: data/processed/binance_japan/BTCJPY/1m/feature_selected/long_H120/features_long_H120_tail_v0.parquet
    description: "long_H120_v0 plus compressed_price_geometry; tail candidate"
