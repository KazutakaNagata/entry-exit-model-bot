feature_set_name: entry_feature_set_v3a
purpose: "Feature factory v3a: v2 plus reviewed trend/return/volatility/activity migration families. Exploration universe, not a selected production set."

include_families:
  - price
  - return_path
  - volatility
  - trend_persistence
  - volume
  - support_resistance
  - market_structure_void
  - pullback_geometry
  - breakout
  - volume_price_pressure
  - rejection_reversal
  - acceleration
  - trend_regime
  - regime_switch
  - micro_range
  - volume_spike
  - compressed_trend
  - compressed_activity
  - compressed_volatility

exclude_patterns:
  - "target_*"
  - "future_*"
  - "*_label*"
  - "*label*"
  - "*_y"
  - "*hold_delta*"
  - "*mfe*"
  - "*mae*"
  - "diag_*"

notes:
  - "v3a is a feature factory expansion, not a selected feature set."
  - "All families are deterministic and past-only, using finalized bars up to row t."
  - "No supervised/compressed scores are trained here; compressed_* families are deterministic summaries."
  - "Use this to restore a wider old-research feature universe before feature selection."
