feature_set_name: entry_feature_set_v3b
purpose: "Feature factory v3b: v3a plus structure / room / price-geometry migration families. Exploration universe, not a selected production set."

include_families:
  - price
  - return_path
  - volatility
  - trend_persistence
  - volume
  - support_resistance
  - market_structure_void
  - pullback_geometry
  - breakout
  - volume_price_pressure
  - rejection_reversal
  - acceleration
  - trend_regime
  - regime_switch
  - micro_range
  - volume_spike
  - compressed_trend
  - compressed_activity
  - compressed_volatility
  - enhanced_support_resistance
  - enhanced_market_structure_void
  - enhanced_pullback_geometry
  - fractal_structure
  - pivot_line
  - compressed_price_geometry
  - compressed_breakout

exclude_patterns:
  - "target_*"
  - "future_*"
  - "*_label*"
  - "*label*"
  - "*_y"
  - "*hold_delta*"
  - "*mfe*"
  - "*mae*"
  - "diag_*"

notes:
  - "v3b is an exploration feature universe. It intentionally includes compressed_activity for full-universe experiments, even though long_H120 ablation found it noisy."
  - "Use model_specific/entry_feature_set_long_H120_v3b_candidate.yaml for the current long_H120 candidate without compressed_activity."
  - "All newly added structure families use past rolling windows or previous levels only."
