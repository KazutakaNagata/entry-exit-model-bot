feature_set_name: exit_feature_set_v3a
purpose: "Exit market feature universe aligned with entry_feature_set_v3a. Position-state features are added by the exit dataset builder, not here."

include_families:
  - price
  - return_path
  - volatility
  - trend_persistence
  - volume
  - support_resistance
  - market_structure_void
  - pullback_geometry
  - breakout
  - volume_price_pressure
  - rejection_reversal
  - acceleration
  - trend_regime
  - regime_switch
  - micro_range
  - volume_spike
  - compressed_trend
  - compressed_activity
  - compressed_volatility

exclude_patterns:
  - "target_*"
  - "future_*"
  - "*_label*"
  - "*label*"
  - "*_y"
  - "*hold_delta*"
  - "diag_*"

notes:
  - "mfe/mae are not generated by market feature builders. They are allowed only as explicit position-state features in exit datasets."
  - "No test-period evaluation or threshold selection belongs in feature generation."
